chroot_path = "/"
dglroot = "/data/"
server_id = "__SERVER_ABBR__"
banner = "/app/dgl-banner.txt"
shed_uid = 1001
shed_gid = 1001
maxusers = 64000
allow_new_nicks = yes
maxnicklen = 20
passwd = "/data/passwd.db3"
lockfile = "/data/dgl-lock"
menu_max_idle_time = 3600

commands[login] = mkdir "/data/morgue/%n", mkdir "/data/ttyrec/%n"

menu["mainmenu_anon"] {
    bannerfile = "/app/dgl-menu-anon.txt"
    commands["l"] = ask_login
    commands["r"] = ask_register
    commands["w"] = watch_menu
    commands["q"] = quit
}

menu["mainmenu_user"] {
    bannerfile = "/app/dgl-menu-user.txt"
    commands["p"] = submenu "play_034"
    commands["t"] = submenu "play_trunk"
    commands["3"] = submenu "play_033"
    commands["2"] = submenu "play_032"
    commands["1"] = submenu "play_031"
    commands["0"] = submenu "play_030"
    commands["w"] = watch_menu
    commands["c"] = chpasswd
    commands["q"] = quit
}

menu["mainmenu_admin"] {
    bannerfile = "/app/dgl-menu-admin.txt"
    commands["p"] = submenu "play_034"
    commands["t"] = submenu "play_trunk"
    commands["3"] = submenu "play_033"
    commands["2"] = submenu "play_032"
    commands["1"] = submenu "play_031"
    commands["0"] = submenu "play_030"
    commands["w"] = watch_menu
    commands["c"] = chpasswd
    commands["q"] = quit
}

