# Host nginx config for __SERVER_HOST__
# Handles HTTPS (certbot) and proxies to Docker containers.
# Install: sudo cp nginx/dcss-host.conf /etc/nginx/sites-available/dcss
#          sudo ln -sf /etc/nginx/sites-available/dcss /etc/nginx/sites-enabled/dcss
#          sudo rm -f /etc/nginx/sites-enabled/default
#          sudo nginx -t && sudo systemctl restart nginx

server {
    listen 80;
    listen [::]:80;
    server_name __SERVER_HOST__;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name __SERVER_HOST__;

    # Certbot will fill these in (or they already exist)
    ssl_certificate     /etc/letsencrypt/live/__SERVER_HOST__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__SERVER_HOST__/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    charset utf-8;

    # Proxy everything to Docker nginx on 127.0.0.1:8880
    location / {
        proxy_pass         http://127.0.0.1:8880;
        proxy_http_version 1.1;

        # WebSocket upgrade (critical for DCSS game terminal)
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Long timeouts — game sessions can last hours
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
