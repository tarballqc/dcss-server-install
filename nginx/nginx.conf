worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events { worker_connections 1024; }

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile     on;
    gzip         on;

    server {
        listen 80;
        server_name _;

        # Docker internal DNS — re-resolve game container IP every 10s
        # (prevents stale IP after container rebuild)
        resolver 127.0.0.11 valid=10s;
        set $game_upstream http://game:8080;

        charset utf-8;

        # ── Game logfiles (for sequell / dcss-stats.com) ──────────────────
        # Versions 0.30-0.33: /data/saves-0.XX/logfile
        # Version 0.34:       /data/saves/logfile
        # Trunk:              /data/saves-trunk/logfile

        location ~ ^/meta/(0\.3[0-3])/(logfile|milestones)$ {
            alias /var/www/morgue/saves-$1/$2;
            default_type text/plain;
        }

        location ~ ^/meta/0\.34/(logfile|milestones)$ {
            alias /var/www/morgue/saves/$1;
            default_type text/plain;
        }

        location ~ ^/meta/git/(logfile|milestones)$ {
            alias /var/www/morgue/saves-trunk/$1;
            default_type text/plain;
        }

        # ── Leaderboard (static HTML from scoring container) ──────────────
        location /scores/ {
            alias  /var/www/scores/;
            index  index.html;
            autoindex off;
        }

        # ── Morgue files ──────────────────────────────────────────────────
        location /morgue/ {
            alias     /var/www/morgue/morgue/;
            autoindex off;
            try_files $uri /browse.html;
        }

        location /morgue-json/ {
            alias     /var/www/morgue/morgue/;
            autoindex on;
            autoindex_format json;
        }

        # ── TTYrec recordings ─────────────────────────────────────────────
        location /ttyrec/ {
            alias     /var/www/morgue/ttyrec/;
            autoindex off;
            try_files $uri /browse.html;
        }

        location /ttyrec-json/ {
            alias     /var/www/morgue/ttyrec/;
            autoindex on;
            autoindex_format json;
        }

        location = /browse.html {
            root /var/www/html;
        }

        # ── RC files (per-user, per-version) ──────────────────────────────
        location /rcfiles/crawl-0.34/ {
            alias     /var/www/morgue/rcfiles/;
            autoindex off;
            default_type text/plain;
            try_files $uri /browse-rc.html;
        }
        location /rcfiles-json/crawl-0.34/ {
            alias     /var/www/morgue/rcfiles/;
            autoindex on;
            autoindex_format json;
        }
        location /rcfiles/crawl-git/ {
            alias     /var/www/morgue/rcfiles-trunk/;
            autoindex off;
            default_type text/plain;
            try_files $uri /browse-rc.html;
        }
        location /rcfiles-json/crawl-git/ {
            alias     /var/www/morgue/rcfiles-trunk/;
            autoindex on;
            autoindex_format json;
        }
        location /rcfiles/crawl-0.33/ {
            alias     /var/www/morgue/rcfiles-0.33/;
            autoindex off;
            default_type text/plain;
            try_files $uri /browse-rc.html;
        }
        location /rcfiles-json/crawl-0.33/ {
            alias     /var/www/morgue/rcfiles-0.33/;
            autoindex on;
            autoindex_format json;
        }
        location /rcfiles/crawl-0.32/ {
            alias     /var/www/morgue/rcfiles-0.32/;
            autoindex off;
            default_type text/plain;
            try_files $uri /browse-rc.html;
        }
        location /rcfiles-json/crawl-0.32/ {
            alias     /var/www/morgue/rcfiles-0.32/;
            autoindex on;
            autoindex_format json;
        }
        location /rcfiles/crawl-0.31/ {
            alias     /var/www/morgue/rcfiles-0.31/;
            autoindex off;
            default_type text/plain;
            try_files $uri /browse-rc.html;
        }
        location /rcfiles-json/crawl-0.31/ {
            alias     /var/www/morgue/rcfiles-0.31/;
            autoindex on;
            autoindex_format json;
        }
        location /rcfiles/crawl-0.30/ {
            alias     /var/www/morgue/rcfiles-0.30/;
            autoindex off;
            default_type text/plain;
            try_files $uri /browse-rc.html;
        }
        location /rcfiles-json/crawl-0.30/ {
            alias     /var/www/morgue/rcfiles-0.30/;
            autoindex on;
            autoindex_format json;
        }

        location = /browse-rc.html {
            root /var/www/html;
        }

        # ── Static files from html dir ────────────────────────────────────
        location = /code_of_conduct.txt {
            root /var/www/html;
            default_type text/plain;
        }

        # ── Banner stats (JS/CSS served from html dir) ────────────────────
        location ~ ^/banner-stats\.(css|js)$ {
            root /var/www/html;
        }

        # ── Lobby preview page ──────────────────────────────────────────
        location = /lobby2.html {
            root /var/www/html;
        }

        # ── Stats shortcut ────────────────────────────────────────────────
        location = /stats {
            rewrite ^ /scores/stats.html last;
        }

        # ── Grafana dashboard ─────────────────────────────────────────────
        location /grafana/ {
            set $grafana_upstream http://grafana:3000;
            proxy_pass         $grafana_upstream/grafana/;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }

        # ── Health check ──────────────────────────────────────────────────
        location = /health {
            types { }
            default_type text/plain;
            add_header Access-Control-Allow-Origin * always;
            add_header Cache-Control "no-store" always;
            return 200 "ok\n";
        }

        # ── Everything else → WebTiles ────────────────────────────────────
        location / {
            proxy_pass         $game_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }
    }
}
